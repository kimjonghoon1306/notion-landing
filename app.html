<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlogAuto Pro - 블로그 관리</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .login-error {
      background: #ef444415;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.82rem;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">📋 BlogAuto Pro</div>
      <div class="login-subtitle">블로그 관리 도구에 로그인하세요</div>

      <div class="login-error" id="errorMsg"></div>

      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" class="form-input" id="userId" placeholder="아이디 입력" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" id="password" placeholder="비밀번호 입력" />
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center; padding:11px;" id="loginBtn">
        로그인
      </button>

      <div style="margin-top:20px; text-align:center; font-size:0.8rem; color:var(--muted)">
        계정이 없으신가요?
        <a href="https://www.blogautopro.com/signup" style="color:var(--green)">회원가입</a>
      </div>
    </div>
  </div>

  <script>
    // 이미 로그인돼 있으면 키워드 페이지로 이동
    if (localStorage.getItem("ba_token")) {
      window.location.href = "/keywords.html";
    }

    async function login() {
      const id = document.getElementById("userId").value.trim();
      const pw = document.getElementById("password").value.trim();
      const errEl = document.getElementById("errorMsg");
      const btn = document.getElementById("loginBtn");

      if (!id || !pw) {
        errEl.textContent = "아이디와 비밀번호를 입력해주세요";
        errEl.style.display = "block";
        return;
      }

      btn.textContent = "로그인 중...";
      btn.disabled = true;

      try {
        const res = await fetch("https://www.blogautopro.com/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "login", userId: id, password: pw }),
        });
        const data = await res.json();

        if (data.ok && data.token) {
          localStorage.setItem("ba_token", data.token);
          localStorage.setItem("ba_user", JSON.stringify(data.user || { id }));
          window.location.href = "/keywords.html";
        } else {
          errEl.textContent = data.error || "로그인에 실패했습니다";
          errEl.style.display = "block";
          btn.textContent = "로그인";
          btn.disabled = false;
        }
      } catch {
        errEl.textContent = "네트워크 오류가 발생했습니다";
        errEl.style.display = "block";
        btn.textContent = "로그인";
        btn.disabled = false;
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  </script>
</body>
</html>
