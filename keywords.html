<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>키워드 관리 - BlogAuto Pro</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <a class="header-logo" href="/keywords.html">📋 BlogAuto Pro</a>
    <nav class="header-nav">
      <a href="/keywords.html" class="active">🔍 <span>키워드</span></a>
      <a href="/posts.html">📝 <span>발행 글</span></a>
      <a href="/revenue.html">💰 <span>수익</span></a>
      <a href="/memo.html">💡 <span>메모</span></a>
      <a href="#" id="logoutBtn" style="color:var(--red)">로그아웃</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">🔍 키워드 관리</div>
    <div class="page-desc">언제 어떤 키워드를 썼는지 기록하고 관리하세요</div>

    <!-- 통계 -->
    <div class="stats-grid" id="stats">
      <div class="stat-card">
        <div class="stat-label">전체 키워드</div>
        <div class="stat-value" id="totalCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">이번 달 사용</div>
        <div class="stat-value" id="thisMonthCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">카테고리 수</div>
        <div class="stat-value" id="categoryCount">-</div>
      </div>
    </div>

    <!-- 추가 버튼 + 검색 -->
    <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
      <input type="text" class="form-input" id="searchInput" placeholder="키워드 검색..." style="flex:1; min-width:160px;" />
      <button class="btn btn-primary" id="addBtn">+ 키워드 추가</button>
    </div>

    <!-- 테이블 -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>키워드</th>
              <th>카테고리</th>
              <th>사용일</th>
              <th>메모</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="keywordList">
            <tr><td colspan="5"><div class="loading">불러오는 중...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 추가/수정 모달 -->
  <div class="modal-overlay" id="modal" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="modalTitle">키워드 추가</div>
      <input type="hidden" id="editId" />

      <div class="form-group">
        <label class="form-label">키워드 *</label>
        <input type="text" class="form-input" id="fKeyword" placeholder="예: 맛집 추천" />
      </div>
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <input type="text" class="form-input" id="fCategory" placeholder="예: 음식, 여행, 재테크" />
      </div>
      <div class="form-group">
        <label class="form-label">사용일</label>
        <input type="date" class="form-input" id="fUsedAt" />
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-textarea" id="fMemo" placeholder="참고할 내용 메모..."></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelBtn">취소</button>
        <button class="btn btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { notionAPI, isLoggedIn, logout } from "/js/api.js";

    if (!isLoggedIn()) window.location.href = "/app.html";

    let keywords = [];

    // 로그아웃
    document.getElementById("logoutBtn").addEventListener("click", (e) => {
      e.preventDefault(); logout();
    });

    // 토스트
    function toast(msg, type = "success") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    // 통계 업데이트
    function updateStats() {
      document.getElementById("totalCount").textContent = keywords.length;
      const thisMonth = new Date().toISOString().slice(0, 7);
      const monthCount = keywords.filter(k => (k.usedAt || "").startsWith(thisMonth)).length;
      document.getElementById("thisMonthCount").textContent = monthCount;
      const cats = new Set(keywords.map(k => k.category).filter(Boolean));
      document.getElementById("categoryCount").textContent = cats.size;
    }

    // 렌더링
    function render(list) {
      const tbody = document.getElementById("keywordList");
      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon">🔍</div>키워드가 없어요. 추가해보세요!</div></td></tr>`;
        return;
      }
      tbody.innerHTML = list.map(k => `
        <tr>
          <td><strong>${k.keyword}</strong></td>
          <td>${k.category ? `<span class="badge badge-blue">${k.category}</span>` : '<span style="color:var(--muted)">-</span>'}</td>
          <td style="color:var(--muted); font-size:0.8rem;">${k.usedAt || "-"}</td>
          <td style="color:var(--muted); font-size:0.8rem; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${k.memo || "-"}</td>
          <td style="white-space:nowrap;">
            <button class="btn btn-outline btn-sm" onclick="editItem('${k.id}')">수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('${k.id}')">삭제</button>
          </td>
        </tr>
      `).join("");
    }

    // 데이터 로드
    async function load() {
      const res = await notionAPI("getKeywords");
      if (res?.ok) {
        keywords = res.list || [];
        updateStats();
        render(keywords);
      }
    }
    load();

    // 검색
    document.getElementById("searchInput").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      const filtered = keywords.filter(k =>
        k.keyword.toLowerCase().includes(q) ||
        (k.category || "").toLowerCase().includes(q) ||
        (k.memo || "").toLowerCase().includes(q)
      );
      render(filtered);
    });

    // 모달 열기
    function openModal(item = null) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modalTitle").textContent = item ? "키워드 수정" : "키워드 추가";
      document.getElementById("editId").value = item?.id || "";
      document.getElementById("fKeyword").value = item?.keyword || "";
      document.getElementById("fCategory").value = item?.category || "";
      document.getElementById("fUsedAt").value = item?.usedAt || new Date().toISOString().slice(0, 10);
      document.getElementById("fMemo").value = item?.memo || "";
    }

    document.getElementById("addBtn").addEventListener("click", () => openModal());
    document.getElementById("cancelBtn").addEventListener("click", () => {
      document.getElementById("modal").style.display = "none";
    });

    // 저장
    document.getElementById("saveBtn").addEventListener("click", async () => {
      const keyword = document.getElementById("fKeyword").value.trim();
      if (!keyword) { toast("키워드를 입력해주세요", "error"); return; }

      const id = document.getElementById("editId").value;
      const data = {
        id,
        keyword,
        category: document.getElementById("fCategory").value.trim(),
        usedAt: document.getElementById("fUsedAt").value,
        memo: document.getElementById("fMemo").value.trim(),
      };

      const btn = document.getElementById("saveBtn");
      btn.textContent = "저장 중..."; btn.disabled = true;

      const res = id
        ? await notionAPI("updateKeyword", data)
        : await notionAPI("saveKeyword", data);

      btn.textContent = "저장"; btn.disabled = false;

      if (res?.ok) {
        document.getElementById("modal").style.display = "none";
        toast(id ? "수정됐어요!" : "추가됐어요!");
        await load();
      } else {
        toast("저장 실패", "error");
      }
    });

    // 수정/삭제 전역
    window.editItem = (id) => {
      const item = keywords.find(k => k.id === id);
      if (item) openModal(item);
    };
    window.deleteItem = async (id) => {
      if (!confirm("삭제할까요?")) return;
      const res = await notionAPI("deleteKeyword", { id });
      if (res?.ok) { toast("삭제됐어요!"); await load(); }
      else toast("삭제 실패", "error");
    };
  </script>
</body>
</html>
