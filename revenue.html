<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월별 수익 — BlogAuto Pro</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="bg-glow"><div class="bg-glow-1"></div><div class="bg-glow-2"></div></div>
<div class="wrap">

  <header class="header">
    <div class="header-left">
      <a class="header-logo" href="/keywords.html">
        <div class="header-logo-icon">📋</div>
        <span>BlogAuto Pro</span>
      </a>
      <nav class="header-nav">
        <a href="/keywords.html">🔍 <span>키워드</span></a>
        <a href="/posts.html">📝 <span>발행 글</span></a>
        <a href="/revenue.html" class="active">💰 <span>수익</span></a>
        <a href="/memo.html">💡 <span>메모</span></a>
      </nav>
    </div>
    <div class="header-right">
      <a href="/index.html" class="bounce-btn bounce-btn-home">🏠 <span class="btn-text">대문으로</span></a>
      <a href="https://www.blogautopro.com/dashboard" class="bounce-btn bounce-btn-dashboard">🚀 <span class="btn-text">대시보드</span></a>
      <button class="theme-btn" id="themeBtn">☀️</button>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <div>
        <div class="page-title">💰 월별 수익</div>
        <div class="page-desc">애드센스, 쿠팡파트너스, 기타 수익을 월별로 정리하세요</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📆</div>
        <div class="stat-label">이번 달 수익</div>
        <div class="stat-value" id="thisMonthRevenue" style="color:var(--green)">₩0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📉</div>
        <div class="stat-label">지난 달 수익</div>
        <div class="stat-value" id="lastMonthRevenue">₩0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-label">올해 총 수익</div>
        <div class="stat-value" id="yearRevenue" style="color:var(--amber)">₩0</div>
      </div>
    </div>

    <div class="toolbar" style="justify-content:flex-end;">
      <button class="btn btn-primary" id="addBtn">✚ 수익 입력</button>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>월</th>
              <th>애드센스</th>
              <th>쿠팡파트너스</th>
              <th>기타</th>
              <th>합계</th>
              <th>메모</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="revenueList">
            <tr><td colspan="7"><div class="loading-wrap"><div class="loading-spinner"></div>불러오는 중...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">✚ 수익 입력</div>
      <button class="modal-close" id="closeBtn">✕</button>
    </div>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label class="form-label">월 *</label>
      <input type="month" class="form-input" id="fMonth" />
    </div>
    <div class="form-group">
      <label class="form-label">애드센스 수익 (원)</label>
      <input type="number" class="form-input" id="fAdsense" placeholder="0" />
    </div>
    <div class="form-group">
      <label class="form-label">쿠팡파트너스 수익 (원)</label>
      <input type="number" class="form-input" id="fCoupang" placeholder="0" />
    </div>
    <div class="form-group">
      <label class="form-label">기타 수익 (원)</label>
      <input type="number" class="form-input" id="fOther" placeholder="0" />
    </div>
    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-textarea" id="fMemo" placeholder="특이사항, 이벤트 등 메모..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelBtn">취소</button>
      <button class="btn btn-primary" id="saveBtn">💾 저장</button>
    </div>
  </div>
</div>

<script type="module">
  import { notionAPI, isLoggedIn } from "/js/api.js";
  import { initHeader, toast } from "/js/common.js";

  if (!isLoggedIn()) window.location.href = "/app.html";
  initHeader();

  let revenues = [];

  const calcTotal = r => (parseInt(r.adsense)||0) + (parseInt(r.coupang)||0) + (parseInt(r.other)||0);

  function updateStats() {
    const thisMonth = new Date().toISOString().slice(0, 7);
    const lastMonth = new Date(new Date().setMonth(new Date().getMonth()-1)).toISOString().slice(0, 7);
    const thisYear = new Date().getFullYear().toString();
    const thisR = revenues.find(r => r.month === thisMonth);
    const lastR = revenues.find(r => r.month === lastMonth);
    const yearTotal = revenues.filter(r => r.month.startsWith(thisYear)).reduce((s,r) => s+calcTotal(r), 0);
    document.getElementById("thisMonthRevenue").textContent = "₩" + (thisR ? calcTotal(thisR) : 0).toLocaleString();
    document.getElementById("lastMonthRevenue").textContent = "₩" + (lastR ? calcTotal(lastR) : 0).toLocaleString();
    document.getElementById("yearRevenue").textContent = "₩" + yearTotal.toLocaleString();
  }

  function render(list) {
    const tbody = document.getElementById("revenueList");
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
        <div class="empty-state-icon">💰</div>
        <div class="empty-state-title">수익 데이터가 없어요</div>
        <div class="empty-state-desc">이번 달 수익을 입력해보세요!</div>
      </div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(r => {
      const total = calcTotal(r);
      return `<tr>
        <td><strong>${r.month}</strong></td>
        <td style="color:var(--text2);">${r.adsense ? "₩"+parseInt(r.adsense).toLocaleString() : "—"}</td>
        <td style="color:var(--text2);">${r.coupang ? "₩"+parseInt(r.coupang).toLocaleString() : "—"}</td>
        <td style="color:var(--text2);">${r.other ? "₩"+parseInt(r.other).toLocaleString() : "—"}</td>
        <td><strong style="color:var(--green);">₩${total.toLocaleString()}</strong></td>
        <td style="color:var(--text2); font-size:0.8rem; max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${r.memo || "—"}</td>
        <td>
          <div style="display:flex; gap:6px; justify-content:flex-end;">
            <button class="btn btn-outline btn-sm" onclick="editItem('${r.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('${r.id}')">🗑️</button>
          </div>
        </td>
      </tr>`;
    }).join("");
  }

  async function load() {
    const res = await notionAPI("getRevenue");
    if (res?.ok) { revenues = res.list || []; updateStats(); render(revenues); }
  }
  load();

  function openModal(item = null) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalTitle").textContent = item ? "✏️ 수익 수정" : "✚ 수익 입력";
    document.getElementById("editId").value = item?.id || "";
    document.getElementById("fMonth").value = item?.month || new Date().toISOString().slice(0, 7);
    document.getElementById("fAdsense").value = item?.adsense || "";
    document.getElementById("fCoupang").value = item?.coupang || "";
    document.getElementById("fOther").value = item?.other || "";
    document.getElementById("fMemo").value = item?.memo || "";
  }
  function closeModal() { document.getElementById("modal").style.display = "none"; }

  document.getElementById("addBtn").addEventListener("click", () => openModal());
  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  document.getElementById("closeBtn").addEventListener("click", closeModal);

  document.getElementById("saveBtn").addEventListener("click", async () => {
    const month = document.getElementById("fMonth").value;
    if (!month) { toast("월을 선택해주세요", "error"); return; }
    const id = document.getElementById("editId").value;
    const data = { id, month,
      adsense: document.getElementById("fAdsense").value,
      coupang: document.getElementById("fCoupang").value,
      other: document.getElementById("fOther").value,
      memo: document.getElementById("fMemo").value.trim(),
    };
    const btn = document.getElementById("saveBtn");
    btn.textContent = "저장 중..."; btn.disabled = true;
    const res = await notionAPI("saveRevenue", data);
    btn.textContent = "💾 저장"; btn.disabled = false;
    if (res?.ok) { closeModal(); toast("저장됐어요!"); await load(); }
    else toast("저장 실패", "error");
  });

  window.editItem = id => openModal(revenues.find(r => r.id === id));
  window.deleteItem = async id => {
    if (!confirm("삭제할까요?")) return;
    const res = await notionAPI("deleteRevenue", { id });
    if (res?.ok) { toast("삭제됐어요!"); await load(); }
    else toast("삭제 실패", "error");
  };

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
</body>
</html>
