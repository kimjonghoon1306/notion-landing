<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월별 수익 - BlogAuto Pro</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <a class="header-logo" href="/keywords.html">📋 BlogAuto Pro</a>
    <nav class="header-nav">
      <a href="/keywords.html">🔍 <span>키워드</span></a>
      <a href="/posts.html">📝 <span>발행 글</span></a>
      <a href="/revenue.html" class="active">💰 <span>수익</span></a>
      <a href="/memo.html">💡 <span>메모</span></a>
      <a href="#" id="logoutBtn" style="color:var(--red)">로그아웃</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">💰 월별 수익</div>
    <div class="page-desc">월별 애드센스, 쿠팡파트너스, 기타 수익을 정리하세요</div>

    <!-- 통계 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">이번 달 수익</div>
        <div class="stat-value" id="thisMonthRevenue" style="color:var(--green)">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">지난 달 수익</div>
        <div class="stat-value" id="lastMonthRevenue">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">올해 총 수익</div>
        <div class="stat-value" id="yearRevenue" style="color:var(--amber)">-</div>
      </div>
    </div>

    <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
      <button class="btn btn-primary" id="addBtn">+ 수익 입력</button>
    </div>

    <!-- 테이블 -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>월</th>
              <th>애드센스</th>
              <th>쿠팡파트너스</th>
              <th>기타</th>
              <th>합계</th>
              <th>메모</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="revenueList">
            <tr><td colspan="7"><div class="loading">불러오는 중...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modal" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="modalTitle">수익 입력</div>
      <input type="hidden" id="editId" />

      <div class="form-group">
        <label class="form-label">월 *</label>
        <input type="month" class="form-input" id="fMonth" />
      </div>
      <div class="form-group">
        <label class="form-label">애드센스 수익 (원)</label>
        <input type="number" class="form-input" id="fAdsense" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">쿠팡파트너스 수익 (원)</label>
        <input type="number" class="form-input" id="fCoupang" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">기타 수익 (원)</label>
        <input type="number" class="form-input" id="fOther" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-textarea" id="fMemo" placeholder="특이사항 메모..."></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelBtn">취소</button>
        <button class="btn btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { notionAPI, isLoggedIn, logout } from "/js/api.js";

    if (!isLoggedIn()) window.location.href = "/app.html";

    let revenues = [];

    document.getElementById("logoutBtn").addEventListener("click", e => { e.preventDefault(); logout(); });

    function toast(msg, type = "success") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    function calcTotal(r) {
      return (parseInt(r.adsense) || 0) + (parseInt(r.coupang) || 0) + (parseInt(r.other) || 0);
    }

    function updateStats() {
      const thisMonth = new Date().toISOString().slice(0, 7);
      const lastMonth = new Date(new Date().setMonth(new Date().getMonth() - 1)).toISOString().slice(0, 7);
      const thisYear = new Date().getFullYear().toString();

      const thisR = revenues.find(r => r.month === thisMonth);
      const lastR = revenues.find(r => r.month === lastMonth);
      const yearTotal = revenues.filter(r => r.month.startsWith(thisYear)).reduce((s, r) => s + calcTotal(r), 0);

      document.getElementById("thisMonthRevenue").textContent = thisR ? "₩" + calcTotal(thisR).toLocaleString() : "₩0";
      document.getElementById("lastMonthRevenue").textContent = lastR ? "₩" + calcTotal(lastR).toLocaleString() : "₩0";
      document.getElementById("yearRevenue").textContent = "₩" + yearTotal.toLocaleString();
    }

    function render(list) {
      const tbody = document.getElementById("revenueList");
      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">💰</div>수익 데이터가 없어요. 추가해보세요!</div></td></tr>`;
        return;
      }
      tbody.innerHTML = list.map(r => {
        const total = calcTotal(r);
        return `
          <tr>
            <td><strong>${r.month}</strong></td>
            <td style="color:var(--muted);">${r.adsense ? "₩" + parseInt(r.adsense).toLocaleString() : "-"}</td>
            <td style="color:var(--muted);">${r.coupang ? "₩" + parseInt(r.coupang).toLocaleString() : "-"}</td>
            <td style="color:var(--muted);">${r.other ? "₩" + parseInt(r.other).toLocaleString() : "-"}</td>
            <td style="color:var(--green); font-weight:700;">₩${total.toLocaleString()}</td>
            <td style="color:var(--muted); font-size:0.8rem; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${r.memo || "-"}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-outline btn-sm" onclick="editItem('${r.id}')">수정</button>
              <button class="btn btn-danger btn-sm" onclick="deleteItem('${r.id}')">삭제</button>
            </td>
          </tr>
        `;
      }).join("");
    }

    async function load() {
      const res = await notionAPI("getRevenue");
      if (res?.ok) { revenues = res.list || []; updateStats(); render(revenues); }
    }
    load();

    function openModal(item = null) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modalTitle").textContent = item ? "수익 수정" : "수익 입력";
      document.getElementById("editId").value = item?.id || "";
      document.getElementById("fMonth").value = item?.month || new Date().toISOString().slice(0, 7);
      document.getElementById("fAdsense").value = item?.adsense || "";
      document.getElementById("fCoupang").value = item?.coupang || "";
      document.getElementById("fOther").value = item?.other || "";
      document.getElementById("fMemo").value = item?.memo || "";
    }

    document.getElementById("addBtn").addEventListener("click", () => openModal());
    document.getElementById("cancelBtn").addEventListener("click", () => { document.getElementById("modal").style.display = "none"; });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const month = document.getElementById("fMonth").value;
      if (!month) { toast("월을 선택해주세요", "error"); return; }

      const id = document.getElementById("editId").value;
      const data = {
        id,
        month,
        adsense: document.getElementById("fAdsense").value,
        coupang: document.getElementById("fCoupang").value,
        other: document.getElementById("fOther").value,
        memo: document.getElementById("fMemo").value.trim(),
      };

      const btn = document.getElementById("saveBtn");
      btn.textContent = "저장 중..."; btn.disabled = true;
      const res = await notionAPI("saveRevenue", data);
      btn.textContent = "저장"; btn.disabled = false;

      if (res?.ok) {
        document.getElementById("modal").style.display = "none";
        toast("저장됐어요!");
        await load();
      } else {
        toast("저장 실패", "error");
      }
    });

    window.editItem = (id) => { const item = revenues.find(r => r.id === id); if (item) openModal(item); };
    window.deleteItem = async (id) => {
      if (!confirm("삭제할까요?")) return;
      const res = await notionAPI("deleteRevenue", { id });
      if (res?.ok) { toast("삭제됐어요!"); await load(); }
      else toast("삭제 실패", "error");
    };
  </script>
</body>
</html>
