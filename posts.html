<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발행 글 현황 - BlogAuto Pro</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <a class="header-logo" href="/keywords.html">📋 BlogAuto Pro</a>
    <nav class="header-nav">
      <a href="/keywords.html">🔍 <span>키워드</span></a>
      <a href="/posts.html" class="active">📝 <span>발행 글</span></a>
      <a href="/revenue.html">💰 <span>수익</span></a>
      <a href="/memo.html">💡 <span>메모</span></a>
      <a href="#" id="logoutBtn" style="color:var(--red)">로그아웃</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">📝 발행 글 현황</div>
    <div class="page-desc">발행한 글의 제목, 날짜, 수익을 추적하세요</div>

    <!-- 통계 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">전체 발행 글</div>
        <div class="stat-value" id="totalCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">이번 달 발행</div>
        <div class="stat-value" id="thisMonthCount">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">총 수익</div>
        <div class="stat-value" id="totalRevenue" style="color:var(--green)">-</div>
      </div>
    </div>

    <!-- 추가 버튼 + 검색 -->
    <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
      <input type="text" class="form-input" id="searchInput" placeholder="글 제목 검색..." style="flex:1; min-width:160px;" />
      <button class="btn btn-primary" id="addBtn">+ 글 추가</button>
    </div>

    <!-- 테이블 -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>제목</th>
              <th>플랫폼</th>
              <th>발행일</th>
              <th>수익</th>
              <th>상태</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="postList">
            <tr><td colspan="6"><div class="loading">불러오는 중...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modal" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="modalTitle">글 추가</div>
      <input type="hidden" id="editId" />

      <div class="form-group">
        <label class="form-label">제목 *</label>
        <input type="text" class="form-input" id="fTitle" placeholder="글 제목 입력" />
      </div>
      <div class="form-group">
        <label class="form-label">플랫폼</label>
        <select class="form-select" id="fPlatform">
          <option value="">선택</option>
          <option value="블로그">블로그</option>
          <option value="티스토리">티스토리</option>
          <option value="미디엄">미디엄</option>
          <option value="워드프레스">워드프레스</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">발행일</label>
        <input type="date" class="form-input" id="fPublishedAt" />
      </div>
      <div class="form-group">
        <label class="form-label">수익 (원)</label>
        <input type="number" class="form-input" id="fRevenue" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">상태</label>
        <select class="form-select" id="fStatus">
          <option value="발행됨">발행됨</option>
          <option value="임시저장">임시저장</option>
          <option value="비공개">비공개</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">URL</label>
        <input type="text" class="form-input" id="fUrl" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label class="form-label">사용 키워드</label>
        <input type="text" class="form-input" id="fKeyword" placeholder="예: 맛집 추천" />
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelBtn">취소</button>
        <button class="btn btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { notionAPI, isLoggedIn, logout } from "/js/api.js";

    if (!isLoggedIn()) window.location.href = "/app.html";

    let posts = [];

    document.getElementById("logoutBtn").addEventListener("click", e => { e.preventDefault(); logout(); });

    function toast(msg, type = "success") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    function updateStats() {
      document.getElementById("totalCount").textContent = posts.length;
      const thisMonth = new Date().toISOString().slice(0, 7);
      document.getElementById("thisMonthCount").textContent = posts.filter(p => (p.publishedAt || "").startsWith(thisMonth)).length;
      const total = posts.reduce((s, p) => s + (parseInt(p.revenue) || 0), 0);
      document.getElementById("totalRevenue").textContent = "₩" + total.toLocaleString();
    }

    const statusBadge = {
      "발행됨": "badge-green",
      "임시저장": "badge-amber",
      "비공개": "badge-muted",
    };

    function render(list) {
      const tbody = document.getElementById("postList");
      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">📝</div>발행된 글이 없어요. 추가해보세요!</div></td></tr>`;
        return;
      }
      tbody.innerHTML = list.map(p => `
        <tr>
          <td>
            <div style="font-weight:600; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
              ${p.url ? `<a href="${p.url}" target="_blank" style="color:var(--text); text-decoration:none;">${p.title}</a>` : p.title}
            </div>
            ${p.keyword ? `<div style="font-size:0.75rem; color:var(--muted); margin-top:2px;">${p.keyword}</div>` : ""}
          </td>
          <td>${p.platform ? `<span class="badge badge-blue">${p.platform}</span>` : '<span style="color:var(--muted)">-</span>'}</td>
          <td style="color:var(--muted); font-size:0.8rem;">${p.publishedAt || "-"}</td>
          <td style="color:var(--green); font-weight:600;">${p.revenue ? "₩" + parseInt(p.revenue).toLocaleString() : "-"}</td>
          <td><span class="badge ${statusBadge[p.status] || 'badge-muted'}">${p.status || "-"}</span></td>
          <td style="white-space:nowrap;">
            <button class="btn btn-outline btn-sm" onclick="editItem('${p.id}')">수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('${p.id}')">삭제</button>
          </td>
        </tr>
      `).join("");
    }

    async function load() {
      const res = await notionAPI("getPosts");
      if (res?.ok) { posts = res.list || []; updateStats(); render(posts); }
    }
    load();

    document.getElementById("searchInput").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      render(posts.filter(p => p.title.toLowerCase().includes(q) || (p.keyword || "").toLowerCase().includes(q)));
    });

    function openModal(item = null) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modalTitle").textContent = item ? "글 수정" : "글 추가";
      document.getElementById("editId").value = item?.id || "";
      document.getElementById("fTitle").value = item?.title || "";
      document.getElementById("fPlatform").value = item?.platform || "";
      document.getElementById("fPublishedAt").value = item?.publishedAt || new Date().toISOString().slice(0, 10);
      document.getElementById("fRevenue").value = item?.revenue || "";
      document.getElementById("fStatus").value = item?.status || "발행됨";
      document.getElementById("fUrl").value = item?.url || "";
      document.getElementById("fKeyword").value = item?.keyword || "";
    }

    document.getElementById("addBtn").addEventListener("click", () => openModal());
    document.getElementById("cancelBtn").addEventListener("click", () => { document.getElementById("modal").style.display = "none"; });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const title = document.getElementById("fTitle").value.trim();
      if (!title) { toast("제목을 입력해주세요", "error"); return; }

      const id = document.getElementById("editId").value;
      const data = {
        id,
        title,
        platform: document.getElementById("fPlatform").value,
        publishedAt: document.getElementById("fPublishedAt").value,
        revenue: document.getElementById("fRevenue").value,
        status: document.getElementById("fStatus").value,
        url: document.getElementById("fUrl").value.trim(),
        keyword: document.getElementById("fKeyword").value.trim(),
      };

      const btn = document.getElementById("saveBtn");
      btn.textContent = "저장 중..."; btn.disabled = true;

      const res = id ? await notionAPI("updatePost", data) : await notionAPI("savePost", data);
      btn.textContent = "저장"; btn.disabled = false;

      if (res?.ok) {
        document.getElementById("modal").style.display = "none";
        toast(id ? "수정됐어요!" : "추가됐어요!");
        await load();
      } else {
        toast("저장 실패", "error");
      }
    });

    window.editItem = (id) => { const item = posts.find(p => p.id === id); if (item) openModal(item); };
    window.deleteItem = async (id) => {
      if (!confirm("삭제할까요?")) return;
      const res = await notionAPI("deletePost", { id });
      if (res?.ok) { toast("삭제됐어요!"); await load(); }
      else toast("삭제 실패", "error");
    };
  </script>
</body>
</html>
