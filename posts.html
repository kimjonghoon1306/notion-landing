<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발행 글 현황 — BlogAuto Pro</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="bg-glow"><div class="bg-glow-1"></div><div class="bg-glow-2"></div></div>
<div class="wrap">

  <header class="header">
    <div class="header-left">
      <a class="header-logo" href="/keywords.html">
        <div class="header-logo-icon">📋</div>
        <span>BlogAuto Pro</span>
      </a>
      <nav class="header-nav">
        <a href="/keywords.html">🔍 <span>키워드</span></a>
        <a href="/posts.html" class="active">📝 <span>발행 글</span></a>
        <a href="/revenue.html">💰 <span>수익</span></a>
        <a href="/memo.html">💡 <span>메모</span></a>
      </nav>
    </div>
    <div class="header-right">
      <a href="/index.html" class="bounce-btn bounce-btn-home">🏠 <span class="btn-text">대문으로</span></a>
      <a href="https://www.blogautopro.com/dashboard" class="bounce-btn bounce-btn-dashboard">🚀 <span class="btn-text">대시보드</span></a>
      <button class="theme-btn" id="themeBtn">☀️</button>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <div>
        <div class="page-title">📝 발행 글 현황</div>
        <div class="page-desc">발행한 글의 제목, 날짜, 수익을 한눈에 추적하세요</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📄</div>
        <div class="stat-label">전체 발행 글</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-label">이번 달 발행</div>
        <div class="stat-value" id="thisMonthCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💵</div>
        <div class="stat-label">총 수익</div>
        <div class="stat-value" id="totalRevenue" style="color:var(--green)">₩0</div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 제목, 키워드 검색..." />
      <button class="btn btn-primary" id="addBtn">✚ 글 추가</button>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>제목</th>
              <th>플랫폼</th>
              <th>발행일</th>
              <th>수익</th>
              <th>상태</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="postList">
            <tr><td colspan="6"><div class="loading-wrap"><div class="loading-spinner"></div>불러오는 중...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">✚ 글 추가</div>
      <button class="modal-close" id="closeBtn">✕</button>
    </div>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label class="form-label">제목 *</label>
      <input type="text" class="form-input" id="fTitle" placeholder="글 제목 입력" />
    </div>
    <div class="form-group">
      <label class="form-label">플랫폼</label>
      <select class="form-select" id="fPlatform">
        <option value="">선택</option>
        <option value="블로그">블로그</option>
        <option value="미디엄">미디엄</option>
        <option value="워드프레스">워드프레스</option>
        <option value="브런치">브런치</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">발행일</label>
      <input type="date" class="form-input" id="fPublishedAt" />
    </div>
    <div class="form-group">
      <label class="form-label">수익 (원)</label>
      <input type="number" class="form-input" id="fRevenue" placeholder="0" />
    </div>
    <div class="form-group">
      <label class="form-label">상태</label>
      <select class="form-select" id="fStatus">
        <option value="발행됨">✅ 발행됨</option>
        <option value="임시저장">📝 임시저장</option>
        <option value="비공개">🔒 비공개</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">URL</label>
      <input type="text" class="form-input" id="fUrl" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label class="form-label">사용 키워드</label>
      <input type="text" class="form-input" id="fKeyword" placeholder="예: 맛집 추천" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelBtn">취소</button>
      <button class="btn btn-primary" id="saveBtn">💾 저장</button>
    </div>
  </div>
</div>

<script type="module">
  import { notionAPI, isLoggedIn } from "/js/api.js";
  import { initHeader, toast } from "/js/common.js";

  if (!isLoggedIn()) window.location.href = "/app.html";
  initHeader();

  let posts = [];

  const statusBadge = { "발행됨": "badge-green", "임시저장": "badge-amber", "비공개": "badge-muted" };

  function updateStats() {
    document.getElementById("totalCount").textContent = posts.length;
    const thisMonth = new Date().toISOString().slice(0, 7);
    document.getElementById("thisMonthCount").textContent = posts.filter(p => (p.publishedAt || "").startsWith(thisMonth)).length;
    const total = posts.reduce((s, p) => s + (parseInt(p.revenue) || 0), 0);
    document.getElementById("totalRevenue").textContent = "₩" + total.toLocaleString();
  }

  function render(list) {
    const tbody = document.getElementById("postList");
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
        <div class="empty-state-icon">📝</div>
        <div class="empty-state-title">발행된 글이 없어요</div>
        <div class="empty-state-desc">첫 번째 글을 추가해보세요!</div>
      </div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(p => `
      <tr>
        <td>
          <div style="font-weight:700; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
            ${p.url ? `<a href="${p.url}" target="_blank" style="color:var(--text); text-decoration:none;">${p.title} 🔗</a>` : p.title}
          </div>
          ${p.keyword ? `<div style="font-size:0.75rem; color:var(--text2); margin-top:3px;">#${p.keyword}</div>` : ""}
        </td>
        <td>${p.platform ? `<span class="badge badge-blue">${p.platform}</span>` : `<span style="color:var(--text2)">—</span>`}</td>
        <td style="color:var(--text2); font-size:0.81rem;">${p.publishedAt || "—"}</td>
        <td style="font-weight:700; color:var(--green);">${p.revenue ? "₩" + parseInt(p.revenue).toLocaleString() : "—"}</td>
        <td><span class="badge ${statusBadge[p.status] || 'badge-muted'}">${p.status || "—"}</span></td>
        <td>
          <div style="display:flex; gap:6px; justify-content:flex-end;">
            <button class="btn btn-outline btn-sm" onclick="editItem('${p.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('${p.id}')">🗑️</button>
          </div>
        </td>
      </tr>
    `).join("");
  }

  async function load() {
    const res = await notionAPI("getPosts");
    if (res?.ok) { posts = res.list || []; updateStats(); render(posts); }
  }
  load();

  document.getElementById("searchInput").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(posts.filter(p => p.title.toLowerCase().includes(q) || (p.keyword || "").toLowerCase().includes(q)));
  });

  function openModal(item = null) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalTitle").textContent = item ? "✏️ 글 수정" : "✚ 글 추가";
    document.getElementById("editId").value = item?.id || "";
    document.getElementById("fTitle").value = item?.title || "";
    document.getElementById("fPlatform").value = item?.platform || "";
    document.getElementById("fPublishedAt").value = item?.publishedAt || new Date().toISOString().slice(0, 10);
    document.getElementById("fRevenue").value = item?.revenue || "";
    document.getElementById("fStatus").value = item?.status || "발행됨";
    document.getElementById("fUrl").value = item?.url || "";
    document.getElementById("fKeyword").value = item?.keyword || "";
    setTimeout(() => document.getElementById("fTitle").focus(), 100);
  }
  function closeModal() { document.getElementById("modal").style.display = "none"; }

  document.getElementById("addBtn").addEventListener("click", () => openModal());
  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  document.getElementById("closeBtn").addEventListener("click", closeModal);

  document.getElementById("saveBtn").addEventListener("click", async () => {
    const title = document.getElementById("fTitle").value.trim();
    if (!title) { toast("제목을 입력해주세요", "error"); return; }
    const id = document.getElementById("editId").value;
    const data = { id, title,
      platform: document.getElementById("fPlatform").value,
      publishedAt: document.getElementById("fPublishedAt").value,
      revenue: document.getElementById("fRevenue").value,
      status: document.getElementById("fStatus").value,
      url: document.getElementById("fUrl").value.trim(),
      keyword: document.getElementById("fKeyword").value.trim(),
    };
    const btn = document.getElementById("saveBtn");
    btn.textContent = "저장 중..."; btn.disabled = true;
    const res = id ? await notionAPI("updatePost", data) : await notionAPI("savePost", data);
    btn.textContent = "💾 저장"; btn.disabled = false;
    if (res?.ok) { closeModal(); toast(id ? "수정됐어요!" : "추가됐어요!"); await load(); }
    else toast("저장 실패", "error");
  });

  window.editItem = id => openModal(posts.find(p => p.id === id));
  window.deleteItem = async id => {
    if (!confirm("삭제할까요?")) return;
    const res = await notionAPI("deletePost", { id });
    if (res?.ok) { toast("삭제됐어요!"); await load(); }
    else toast("삭제 실패", "error");
  };

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
</body>
</html>
