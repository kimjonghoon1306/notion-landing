<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이디어 메모 — BlogAuto Pro</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .memo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .memo-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px;
      position: relative; overflow: hidden;
      transition: all 0.25s; cursor: default;
    }
    .memo-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: rgba(255,61,110,0.3); }
    .memo-color-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 18px 18px 0 0; }
    .memo-card-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 10px; letter-spacing: -0.01em; }
    .memo-card-content {
      font-size: 0.82rem; color: var(--text2); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 12px; white-space: pre-wrap;
    }
    .memo-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .memo-tag {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 20px;
      font-size: 0.71rem; font-weight: 600;
      background: rgba(255,255,255,0.07); color: var(--text2);
    }
    [data-theme="light"] .memo-tag { background: rgba(0,0,0,0.06); }
    .memo-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .memo-date { font-size: 0.74rem; color: var(--text2); }
    .memo-actions { display: flex; gap: 6px; }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
    .color-opt:hover, .color-opt.selected { border-color: white; transform: scale(1.2); }
    [data-theme="light"] .color-opt:hover, [data-theme="light"] .color-opt.selected { border-color: #333; }
  </style>
</head>
<body>
<div class="bg-glow"><div class="bg-glow-1"></div><div class="bg-glow-2"></div></div>
<div class="wrap">

  <header class="header">
    <div class="header-left">
      <a class="header-logo" href="/keywords.html">
        <div class="header-logo-icon">📋</div>
        <span>BlogAuto Pro</span>
      </a>
      <nav class="header-nav">
        <a href="/keywords.html">🔍 <span>키워드</span></a>
        <a href="/posts.html">📝 <span>발행 글</span></a>
        <a href="/revenue.html">💰 <span>수익</span></a>
        <a href="/memo.html" class="active">💡 <span>메모</span></a>
      </nav>
    </div>
    <div class="header-right">
      <a href="/index.html" class="bounce-btn bounce-btn-home">🏠 <span class="btn-text">대문으로</span></a>
      <a href="https://www.blogautopro.com/dashboard" class="bounce-btn bounce-btn-dashboard">🚀 <span class="btn-text">대시보드</span></a>
      <button class="theme-btn" id="themeBtn">☀️</button>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <div>
        <div class="page-title">💡 아이디어 메모</div>
        <div class="page-desc">블로그 아이디어와 메모를 자유롭게 기록하세요</div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 제목, 내용, 태그 검색..." />
      <button class="btn btn-primary" id="addBtn">✚ 메모 추가</button>
    </div>

    <div class="memo-grid" id="memoGrid">
      <div style="grid-column:1/-1;">
        <div class="loading-wrap"><div class="loading-spinner"></div>불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">✚ 메모 추가</div>
      <button class="modal-close" id="closeBtn">✕</button>
    </div>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label class="form-label">제목 *</label>
      <input type="text" class="form-input" id="fTitle" placeholder="메모 제목" />
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-textarea" id="fContent" placeholder="아이디어, 참고 링크, 메모 내용..." style="min-height:130px;"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">태그 (쉼표로 구분)</label>
      <input type="text" class="form-input" id="fTags" placeholder="예: 맛집, 여행, 재테크" />
    </div>
    <div class="form-group">
      <label class="form-label">색상</label>
      <div class="color-picker" id="colorPicker">
        <div class="color-opt selected" data-color="#ff3d6e" style="background:#ff3d6e;"></div>
        <div class="color-opt" data-color="#ec4899" style="background:#ec4899;"></div>
        <div class="color-opt" data-color="#a855f7" style="background:#a855f7;"></div>
        <div class="color-opt" data-color="#3b82f6" style="background:#3b82f6;"></div>
        <div class="color-opt" data-color="#10b981" style="background:#10b981;"></div>
        <div class="color-opt" data-color="#f59e0b" style="background:#f59e0b;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelBtn">취소</button>
      <button class="btn btn-primary" id="saveBtn">💾 저장</button>
    </div>
  </div>
</div>

<script type="module">
  import { notionAPI, isLoggedIn } from "/js/api.js";
  import { initHeader, toast } from "/js/common.js";

  if (!isLoggedIn()) window.location.href = "/app.html";
  initHeader();

  let memos = [];
  let selectedColor = "#ff3d6e";

  // 색상 픽커
  document.querySelectorAll(".color-opt").forEach(opt => {
    opt.addEventListener("click", () => {
      document.querySelectorAll(".color-opt").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
      selectedColor = opt.dataset.color;
    });
  });

  function formatDate(str) {
    try { const d = new Date(str); return `${d.getMonth()+1}/${d.getDate()}`; } catch { return ""; }
  }

  function render(list) {
    const grid = document.getElementById("memoGrid");
    if (!list.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state">
        <div class="empty-state-icon">💡</div>
        <div class="empty-state-title">메모가 없어요</div>
        <div class="empty-state-desc">아이디어를 자유롭게 기록해보세요!</div>
      </div></div>`;
      return;
    }
    grid.innerHTML = list.map(m => {
      const tags = (m.tags || "").split(",").map(t => t.trim()).filter(Boolean);
      return `
        <div class="memo-card">
          <div class="memo-color-bar" style="background:${m.color || '#ff3d6e'}"></div>
          <div class="memo-card-title">${m.title}</div>
          ${m.content ? `<div class="memo-card-content">${m.content}</div>` : ""}
          ${tags.length ? `<div class="memo-tags">${tags.map(t => `<span class="memo-tag">#${t}</span>`).join("")}</div>` : ""}
          <div class="memo-footer">
            <span class="memo-date">${formatDate(m.createdAt)}</span>
            <div class="memo-actions">
              <button class="btn btn-outline btn-sm" onclick="editItem('${m.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteItem('${m.id}')">🗑️</button>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  async function load() {
    const res = await notionAPI("getMemos");
    if (res?.ok) { memos = res.list || []; render(memos); }
  }
  load();

  document.getElementById("searchInput").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    render(memos.filter(m =>
      m.title.toLowerCase().includes(q) ||
      (m.content || "").toLowerCase().includes(q) ||
      (m.tags || "").toLowerCase().includes(q)
    ));
  });

  function openModal(item = null) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalTitle").textContent = item ? "✏️ 메모 수정" : "✚ 메모 추가";
    document.getElementById("editId").value = item?.id || "";
    document.getElementById("fTitle").value = item?.title || "";
    document.getElementById("fContent").value = item?.content || "";
    document.getElementById("fTags").value = item?.tags || "";
    selectedColor = item?.color || "#ff3d6e";
    document.querySelectorAll(".color-opt").forEach(o => {
      o.classList.toggle("selected", o.dataset.color === selectedColor);
    });
    setTimeout(() => document.getElementById("fTitle").focus(), 100);
  }
  function closeModal() { document.getElementById("modal").style.display = "none"; }

  document.getElementById("addBtn").addEventListener("click", () => openModal());
  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  document.getElementById("closeBtn").addEventListener("click", closeModal);

  document.getElementById("saveBtn").addEventListener("click", async () => {
    const title = document.getElementById("fTitle").value.trim();
    if (!title) { toast("제목을 입력해주세요", "error"); return; }
    const id = document.getElementById("editId").value;
    const data = { id, title,
      content: document.getElementById("fContent").value.trim(),
      tags: document.getElementById("fTags").value.trim(),
      color: selectedColor,
    };
    const btn = document.getElementById("saveBtn");
    btn.textContent = "저장 중..."; btn.disabled = true;
    const res = id ? await notionAPI("updateMemo", data) : await notionAPI("saveMemo", data);
    btn.textContent = "💾 저장"; btn.disabled = false;
    if (res?.ok) { closeModal(); toast(id ? "수정됐어요!" : "추가됐어요!"); await load(); }
    else toast("저장 실패", "error");
  });

  window.editItem = id => openModal(memos.find(m => m.id === id));
  window.deleteItem = async id => {
    if (!confirm("삭제할까요?")) return;
    const res = await notionAPI("deleteMemo", { id });
    if (res?.ok) { toast("삭제됐어요!"); await load(); }
    else toast("삭제 실패", "error");
  };

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
</body>
</html>
